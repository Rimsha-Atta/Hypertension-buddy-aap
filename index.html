<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hypertension Monitoring System</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="mobile-frame">
      <div class="app-header">
        <i class="fas fa-heartbeat"></i>
        <span>Heart Health KBS</span>
      </div>

      <div class="main-content">
        <h3>Clinical Analysis</h3>
        <p class="sub-text">Enter patient details for health assessment</p>

        <div class="input-card">
          <div class="input-group">
            <label><i class="fas fa-user"></i> Patient Age</label>
            <input type="number" id="user-age" placeholder="e.g. 25" />
          </div>
          <div class="input-group">
            <label><i class="fas fa-arrow-up"></i> Systolic (Upper)</label>
            <input type="number" id="systolic" placeholder="120" />
          </div>
          <div class="input-group">
            <label><i class="fas fa-arrow-down"></i> Diastolic (Lower)</label>
            <input type="number" id="diastolic" placeholder="80" />
          </div>
          <button onclick="analyzeHealth()" id="btn-analyze">
            Analyze Now
          </button>
        </div>

        <div id="result-card" class="result-card">
          <h2 id="diagnosis-title"></h2>
          <p id="diagnosis-desc"></p>
        </div>

        <div class="history-section">
          <h4><i class="fas fa-history"></i> Recent Logs</h4>
          <div id="history-list"></div>
          <button onclick="clearHistory()" class="btn-clear">
            Clear Records
          </button>
        </div>
      </div>

      <div class="nav-bar">
        <i class="fas fa-home active"></i>
        <i class="fas fa-chart-line"></i>
        <i class="fas fa-user-circle"></i>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
