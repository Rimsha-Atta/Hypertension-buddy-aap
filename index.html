<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Health Smart KBS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="login-screen" class="full-bg">
      <div class="login-card">
        <div class="user-icon">👤</div>
        <h2>Clinical Login</h2>
        <p>Enter details to access KBS</p>
        <input type="text" id="login-name" placeholder="Full Name" />
        <input
          type="email"
          id="login-email"
          placeholder="Email Address"
          oninput="checkEmail()"
        />
        <p
          id="email-error"
          style="color: #ff4d4d; display: none; font-size: 11px; margin: 0"
        >
          Invalid email format
        </p>
        <button onclick="loginUser()" class="primary-btn">Access System</button>
      </div>
    </div>

    <div id="app-screen" style="display: none">
      <div class="mobile-frame">
        <div class="app-header"><span>❤️ MyHeart Health</span></div>

        <div class="app-content">
          <div id="home-tab">
            <h3>Clinical Analysis</h3>
            <label>Patient Age</label>
            <input type="number" id="age" placeholder="e.g. 23" />
            <label>↑ Systolic (Upper)</label>
            <input type="number" id="systolic" placeholder="120" />
            <label>↓ Diastolic (Lower)</label>
            <input type="number" id="diastolic" placeholder="80" />
            <button onclick="analyzeBP()" class="analyze-btn">
              Analyze Now
            </button>

            <div id="result-box" style="display: none; margin-top: 15px">
              <div
                id="status-badge"
                style="
                  padding: 10px;
                  border-radius: 8px;
                  color: white;
                  font-weight: bold;
                  text-align: center;
                "
              ></div>
              <p
                id="expert-advice"
                style="
                  font-weight: bold;
                  font-size: 13px;
                  margin-top: 10px;
                  color: #2c3e50;
                "
              ></p>
            </div>
          </div>

          <div id="stats-tab" style="display: none">
            <h3>Clinical Statistics</h3>
            <div style="max-height: 350px; overflow-y: auto">
              <table
                style="
                  width: 100%;
                  font-size: 12px;
                  border-collapse: collapse;
                  background: white;
                  border-radius: 10px;
                "
              >
                <thead
                  style="
                    background: #5d6dfc;
                    color: white;
                    position: sticky;
                    top: 0;
                  "
                >
                  <tr>
                    <th style="padding: 10px">Date</th>
                    <th style="padding: 10px">BP</th>
                    <th style="padding: 10px">Status</th>
                  </tr>
                </thead>
                <tbody id="stats-table-body"></tbody>
              </table>
            </div>
          </div>

          <div id="profile-tab" style="display: none">
            <h3>Practitioner Profile</h3>
            <div
              style="
                text-align: center;
                background: white;
                padding: 20px;
                border-radius: 15px;
              "
            >
              <div style="font-size: 50px; color: #5d6dfc">👤</div>
              <h4 id="display-name" style="margin: 10px 0 5px 0"></h4>
              <p id="display-email" style="color: #666; font-size: 13px"></p>
              <hr style="border: 0.5px solid #eee; margin: 15px 0" />
              <button
                onclick="clearHistory()"
                style="
                  background: #fff0f0;
                  color: #ff4d4d;
                  border: 1px solid #ff4d4d;
                  padding: 10px;
                  border-radius: 10px;
                  cursor: pointer;
                  width: 100%;
                  font-weight: bold;
                  margin-bottom: 10px;
                "
              >
                🗑️ Reset All History
              </button>
              <button
                onclick="logout()"
                style="
                  background: #ff4d4d;
                  color: white;
                  border: none;
                  padding: 10px;
                  border-radius: 10px;
                  cursor: pointer;
                  width: 100%;
                "
              >
                Logout
              </button>
            </div>
          </div>
        </div>

        <div class="bottom-nav">
          <span onclick="showTab('home')" style="cursor: pointer">🏠</span>
          <span onclick="showTab('stats')" style="cursor: pointer">📈</span>
          <span onclick="showTab('profile')" style="cursor: pointer">👤</span>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
