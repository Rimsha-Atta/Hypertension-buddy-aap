<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Health Smart KBS</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div id="login-screen" class="login-overlay">
      <div class="login-box">
        <i class="fas fa-user-shield"></i>
        <h2>Clinical Login</h2>
        <p>Enter details to access KBS</p>
        <input type="text" id="username" placeholder="Full Name" />
        <input type="email" id="useremail" placeholder="Email Address" />
        <button onclick="handleLogin(false)">Access System</button>
        <p id="guest-option" class="guest-link" onclick="handleLogin(true)">
          Continue as Guest (First time only)
        </p>
      </div>
    </div>

    <div class="mobile-frame" id="app-content" style="display: none">
      <div class="app-header">
        <i class="fas fa-heartbeat"></i>
        <span>MyHeart Health</span>
      </div>

      <div class="main-content">
        <div id="home-page">
          <h3>Clinical Analysis</h3>
          <div class="input-card">
            <div class="input-group">
              <label><i class="fas fa-user"></i> Patient Age</label>
              <input type="number" id="user-age" placeholder="e.g. 25" />
            </div>
            <div class="input-group">
              <label><i class="fas fa-arrow-up"></i> Systolic (Upper)</label>
              <input type="number" id="systolic" placeholder="120" />
            </div>
            <div class="input-group">
              <label><i class="fas fa-arrow-down"></i> Diastolic (Lower)</label>
              <input type="number" id="diastolic" placeholder="80" />
            </div>
            <button onclick="analyzeHealth()" id="btn-analyze">
              Analyze Now
            </button>
          </div>

          <div id="result-card" class="result-card">
            <h2 id="diagnosis-title"></h2>
            <p id="diagnosis-desc"></p>
          </div>
        </div>

        <div id="stats-page" style="display: none">
          <div class="history-section">
            <h4><i class="fas fa-history"></i> Recent Records</h4>
            <div id="history-list"></div>
            <button onclick="clearHistory()" class="btn-clear">
              Clear History
            </button>
          </div>
        </div>

        <div id="profile-page" style="display: none">
          <div class="profile-card">
            <i
              class="fas fa-user-circle"
              style="font-size: 5rem; color: #4f46e5; margin-bottom: 10px"
            ></i>
            <h2 id="display-username">User Name</h2>
            <p id="display-email" style="color: #64748b; font-size: 0.8rem">
              email@example.com
            </p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee" />
            <div style="text-align: left; font-size: 0.9rem">
              <p><strong>Account Status:</strong> Active</p>
              <p><strong>System Role:</strong> Practitioner</p>
            </div>
            <button onclick="logoutOnly()" class="btn-logout">Logout</button>
            <button onclick="resetApp()" class="btn-reset">
              Reset All Data
            </button>
          </div>
        </div>
      </div>

      <div class="nav-bar">
        <i
          class="fas fa-home active"
          id="home-icon"
          onclick="showPage('home')"
        ></i>
        <i
          class="fas fa-chart-line"
          id="stats-icon"
          onclick="showPage('stats')"
        ></i>
        <i
          class="fas fa-user"
          id="profile-icon"
          onclick="showPage('profile')"
        ></i>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
